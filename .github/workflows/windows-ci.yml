name: Windows CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Configure MSVC Release
        run: cmake -S . -B build-ci -A x64 -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build-ci --config Release --parallel

      - name: Test
        run: ctest --test-dir build-ci -C Release --output-on-failure
